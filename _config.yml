# Site settings
locale: "en-US"
site_theme: "default"
title: "Junteng Liu"
title_separator: "-"
name: "Junteng Liu"
description: "Natural language processing and machine learning"
url: "https://mice5canad.github.io"
baseurl: "/LJT-Homepage"
repository: "mice5canad/LJT-Homepage"

# Author profile
# Fields not provided by Junteng Liu are intentionally omitted.
author:
  name: "Junteng Liu"
  bio: "First-year PhD candidate at HKUST NLP Group"
  email: "jliugi@connect.ust.hk"
  googlescholar: "https://scholar.google.com/citations?hl=en&user=tbK9jl4AAAAJ&view_op=list_works&sortby=pubdate"
  github: "Vicent0205"
  twitter: "junteng88716710"

# Site behavior
teaser:
breadcrumbs: false
words_per_minute: 160
future: false
read_more: "disabled"
talkmap_link: false
comments:
  provider:
atom_feed:
  hide: true
  path:

# Structured profile data
social:
  type: Person
  name: "Junteng Liu"
  links:
    - "https://github.com/Vicent0205"
    - "https://scholar.google.com/citations?hl=en&user=tbK9jl4AAAAJ&view_op=list_works&sortby=pubdate"

analytics:
  provider: "false"

# Files processed by Jekyll
include:
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .devcontainer
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - _drafts
  - _portfolio
  - _posts
  - _publications
  - _talks
  - _teaching
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Dockerfile
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - files
  - images/500x300.png
  - images/bio-photo-2.jpg
  - images/bio-photo.jpg
  - images/editing-talk.png
  - images/profile.png
  - images/themes
  - images/wiki
  - README.md
  - docker-compose.yaml
  - markdown_generator
  - node_modules
  - package.json
  - scripts
  - talkmap
  - talkmap.ipynb
  - talkmap_out.ipynb
  - talkmap.py
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Markdown processing
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Only the home page and publications page are published.
defaults:
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
      published: false
  - scope:
      path: ""
      type: posts
    values:
      published: false

# Styling and output
sass:
  sass_dir: _sass
  style: compressed
permalink: /:categories/:title/
timezone: Etc/UTC

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

compress_html:
  clippings: all
  ignore:
    envs: development
